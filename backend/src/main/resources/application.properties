spring.application.name=backend

# 자격증명은 환경변수로 주입한다(미설정 시 로컬 개발용 기본값 사용). 배포 시 DB_* 환경변수로 오버라이드.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ttukttakbap?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 어드민 고정 계정. 로컬 기본값(admin/admin1234)은 개발용이며 운영에서는 반드시 환경변수로 오버라이드.
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin1234}

# JWT. 시크릿은 운영에서 반드시 JWT_SECRET으로 오버라이드(HS256, 32바이트 이상).
jwt.secret=${JWT_SECRET:local-dev-secret-key-please-override-32bytes!!}
jwt.access-expiry-millis=${JWT_ACCESS_EXPIRY_MILLIS:1800000}
jwt.refresh-expiry-millis=${JWT_REFRESH_EXPIRY_MILLIS:1209600000}

# 카카오 OAuth. 콘솔에서 발급받은 값을 환경변수로 주입(git에 커밋 금지).
oauth.kakao.client-id=${KAKAO_CLIENT_ID:}
oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET:}

# 리프레시 토큰 저장소: memory(기본) | redis. 운영은 redis로 오버라이드.
refresh-token.store=${REFRESH_TOKEN_STORE:memory}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
