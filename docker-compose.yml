# 뚝딱밥 전체 스택 (Caddy + 프론트 + 백엔드 + MySQL + Redis).
# 시크릿은 같은 디렉토리의 .env 에서 읽는다(.env.example 참고). Caddy만 외부 포트 공개.
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        NEXT_PUBLIC_KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
    restart: unless-stopped
    environment:
      # 서버 컴포넌트가 compose 내부망으로 백엔드를 직접 호출.
      - API_INTERNAL_URL=http://backend:8080/api/v1
    expose:
      - "3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # AMD 1GB VM 대응: JVM 힙 상한 제한(비힙 포함 실사용 ~450MB)
      - JAVA_TOOL_OPTIONS=-Xmx256m
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8
    restart: unless-stopped
    # AMD 1GB VM 대응: 버퍼풀 축소 + performance_schema 비활성(~100MB 절감)
    command: ["--innodb-buffer-pool-size=64M", "--performance-schema=OFF"]
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "3306"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    expose:
      - "6379"

volumes:
  caddy_data:
  caddy_config:
  mysql_data:
  redis_data:
